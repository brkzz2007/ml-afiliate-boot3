services:
  - type: web
    name: ml-afiliados-bot
    region: frankfurt
    env: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: WHATSAPP_TARGET_NUMBER
        value: "5569984520192"
      - key: WHATSAPP_TARGET_GROUP
        value: "OfertaLar #17"
      - key: ML_AFFILIATE_TAG
        sync: false
      - key: ML_SEARCH_KEYWORD
        value: "Kit clínico odontológico,Kit de limpeza de tártaro,Curetas periodontais,Instrumento de Lucas,Matrizes dentárias,Alginato para moldagem,Resina odontológica,Fotopolimerizador,Ultrassom odontológico,Jato de bicarbonato,Contra ângulo odontológico,Caneta de alta rotação,Compressor odontológico,Sugador odontológico,Kit acadêmico odontológico,Luvas descartáveis,Máscaras cirúrgicas,Aventais descartáveis,Babadores odontológicos,Autoclave,Seladora para esterilização,Brocas odontológicas,Sugadores descartáveis,Escovas de profilaxia,Pasta profilática,Cimento odontológico,Clareador dental profissional,Moldeiras odontológicas,Fios de sutura odontológica,Anestésicos tópicos odontológicos,Organizadores,bandejas clínicas"
      - key: CRON_CAPTURE_SCHEDULE
        value: "0 * * * *"
      - key: CRON_PUBLISH_SCHEDULE
        value: "*/3 * * * *"
